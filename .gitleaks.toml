# Gitleaks configuration
# See https://github.com/gitleaks/gitleaks#configuration for full reference

title = "Event Checker Gitleaks Config"

# Extend the default gitleaks rules
[extend]
useDefault = true

# Paths to ignore during scanning
[allowlist]
paths = [
    '''gradle-wrapper\.jar''',
    '''\.gradle''',
    '''node_modules''',
    '''build/''',
    '''\.idea''',
]

