# CodeQL advanced setup.
#
# Replaces GitHub's CodeQL "default setup" so we control which languages are analyzed.
# NOTE: default setup must be turned off (Settings → Code security → Code scanning) for this
# workflow to run — GitHub rejects an advanced workflow while default setup is enabled.
#
# Only `javascript-typescript` is analyzed. `java-kotlin` is intentionally omitted: the bundled
# CodeQL extractor supports Kotlin below 2.3.30, but this repo is on Kotlin 2.4.x, which the
# extractor rejects ("Kotlin version too recent") and fails the job. The backend stays covered by
# detekt + OWASP Dependency-Check in build-backend.yml. Re-add a `java-kotlin` matrix entry once
# the CodeQL CLI supports the project's Kotlin version.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Monday 03:42 UTC. Off-the-hour to avoid the cron stampede on shared runners.
    - cron: '42 3 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
