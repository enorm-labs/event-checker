name: Build & Test Frontend

on:
  push:
    branches: [ main ]
    paths:
      - 'events-frontend/**'
      - '.github/workflows/build-frontend.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'events-frontend/**'
      - '.github/workflows/build-frontend.yml'

permissions:
  contents: read

defaults:
  run:
    working-directory: events-frontend

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    # Fail fast instead of hanging for the GitHub default of 6h when the
    # Playwright system-dependency install stalls on a slow apt mirror.
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24' # should match the version specified in .nvmrc
          cache: 'npm'
          cache-dependency-path: events-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run unit tests with coverage
        run: npm run test:unit:coverage -- --reporter=default

      - name: Post coverage to Job Summary
        if: success() || failure()
        run: |
          echo "## 📊 Test Coverage (Vitest/V8)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            node -e "
              const r = require('./coverage/coverage-summary.json').total;
              const fmt = (m) => m.pct + '%';
              console.log('Lines:      ' + fmt(r.lines));
              console.log('Statements: ' + fmt(r.statements));
              console.log('Functions:  ' + fmt(r.functions));
              console.log('Branches:   ' + fmt(r.branches));
            " >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "_No coverage report generated._" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Get Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.PLAYWRIGHT_VERSION }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright system dependencies only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run e2e tests
        run: npm run test:e2e
