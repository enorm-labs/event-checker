# source: https://github.com/gradle/actions
# full documentation: https://github.com/gradle/actions/blob/main/docs/setup-gradle.md
name: Build & Test Backend

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'events-frontend/**'
      - '*.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'events-frontend/**'
      - '*.md'
      - 'docs/**'

permissions:
  contents: read
  pull-requests: write
  # Required for uploading SARIF to GitHub Code Scanning
  security-events: write
  # Required for workflows in private repositories
  actions: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 25 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Lint with ktlint
        run: ./gradlew ktlintCheck

      - name: Static analysis with detekt
        run: ./gradlew detekt

      - name: Post detekt report to Job Summary
        if: success() || failure()
        run: |
          echo "## 🔍 Detekt Static Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for report in */build/reports/detekt/detekt.md; do
            module=$(echo "$report" | cut -d'/' -f1)
            # Replace the generic "# detekt" heading with a module-specific one
            sed "s/^# detekt$/# detekt — ${module}/" "$report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "---" >> $GITHUB_STEP_SUMMARY
          done

      # Upload each module's SARIF report separately with a unique category.
      # GitHub Code Scanning supports multiple SARIF uploads per commit when each
      # has a distinct category. See: https://docs.github.com/en/code-security/code-scanning/integrating-with-code-scanning/uploading-a-sarif-file-to-github
      - name: Upload detekt SARIF (events-core)
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: events-core/build/reports/detekt/detekt.sarif
          category: detekt-events-core
      - name: Upload detekt SARIF (events-bff)
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: events-bff/build/reports/detekt/detekt.sarif
          category: detekt-events-bff
      - name: Upload detekt SARIF (events-importer)
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: events-importer/build/reports/detekt/detekt.sarif
          category: detekt-events-importer

      - name: Build all modules
        run: ./gradlew build -x test

      - name: Run tests
        run: ./gradlew test

      - name: Generate Kover coverage reports
        run: ./gradlew koverXmlReport koverLog

      - name: Post coverage to Job Summary
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Test Coverage (Kover)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat build/kover/coverage.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Post coverage to Pull Request
        if: github.event_name == 'pull_request'
        uses: mi-kas/kover-report@v1
        with:
          path: build/reports/kover/report.xml
          title: Code Coverage
          update-comment: true
          min-coverage-overall: 60
          min-coverage-changed-files: 80

  # OWASP Dependency-Check runs as a separate job in parallel with the build to avoid
  # slowing down the main feedback loop.
  #
  # On PRs this job is INFORMATIONAL and non-blocking: it surfaces newly introduced
  # vulnerable dependencies in GitHub Code Scanning but never blocks a merge, so a
  # flaky/unavailable NVD API can't hold up PRs. The authoritative, enforced scan runs
  # nightly in dependency-check-scheduled.yml, which also seeds the shared NVD cache on
  # main that this job restores (caches created on main are restorable from PR branches).
  dependency-check:
    name: OWASP Dependency-Check (informational)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 25 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # Restore the NVD database cache seeded by the nightly scheduled scan on main.
      # A warm cache lets the build skip the NVD update entirely (see nvd.validForHours
      # in build.gradle.kts), so PR runs are fast and not exposed to NVD API outages.
      # This job is read-only on the cache — the scheduled workflow owns seeding it.
      - name: Restore NVD database cache
        id: nvd-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.gradle/dependency-check-data
          key: dependency-check-data-${{ github.run_id }}
          restore-keys: |
            dependency-check-data-

      # Non-blocking: a failure here (e.g. NVD unreachable on a cold cache) is recorded
      # but does not fail the job, so PRs are never blocked by the dependency scan.
      - name: Run OWASP Dependency-Check
        id: depcheck
        continue-on-error: true
        run: ./gradlew dependencyCheckAggregate
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Post report to Job Summary
        if: success() || failure()
        run: |
          echo "## 🛡️ OWASP Dependency-Check (informational)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.depcheck.outcome }}" = "success" ]; then
            echo "✅ Scan completed. Findings (if any) are in the Security → Code scanning tab." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Scan did not complete (often a transient NVD API outage). This is" >> $GITHUB_STEP_SUMMARY
            echo "non-blocking on PRs — the authoritative scan runs nightly via" >> $GITHUB_STEP_SUMMARY
            echo "dependency-check-scheduled.yml." >> $GITHUB_STEP_SUMMARY
          fi

      # Only upload when the report exists. If the scan aborts (e.g. an NVD update
      # failure), no report is written and these steps would otherwise fail with a
      # confusing "Path does not exist" error that masks the real cause.
      - name: Upload SARIF to GitHub Code Scanning
        if: (success() || failure()) && hashFiles('build/reports/dependency-check-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: build/reports/dependency-check-report.sarif
          category: owasp-dependency-check

      - name: Upload HTML report as artifact
        if: (success() || failure()) && hashFiles('build/reports/dependency-check-report.html') != ''
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: build/reports/dependency-check-report.html

