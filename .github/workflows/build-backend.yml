# source: https://github.com/gradle/actions
# full documentation: https://github.com/gradle/actions/blob/main/docs/setup-gradle.md
name: Build & Test Backend

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'events-frontend/**'
      - '*.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'events-frontend/**'
      - '*.md'
      - 'docs/**'

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 25 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Lint with ktlint
        run: ./gradlew ktlintCheck

      - name: Build all modules
        run: ./gradlew build -x test

      - name: Run tests
        run: ./gradlew test
