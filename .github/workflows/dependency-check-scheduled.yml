# Authoritative OWASP Dependency-Check.
#
# This is the enforced dependency vulnerability scan. It runs on a nightly schedule
# (and on demand) against main rather than on every PR, for two reasons:
#
#   1. It owns the shared NVD database cache. Caches saved here on main are restorable
#      from PR branches, so the informational PR scan in build-backend.yml stays fast
#      and is not exposed to NVD API outages.
#   2. The NVD API is frequently rate-limited or returns 503s. A nightly cadence means a
#      transient outage just retries the next night instead of blocking anyone's PR.
#
# Use the "Run workflow" button (workflow_dispatch) to seed the cache on demand — e.g.
# the first time, or after an NVD outage clears.
name: Scheduled OWASP Dependency-Check

on:
  schedule:
    # 03:17 UTC daily. Off-the-hour to avoid the cron stampede on shared runners.
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  # Required for uploading SARIF to GitHub Code Scanning
  security-events: write

jobs:
  dependency-check:
    name: OWASP Dependency-Check (authoritative)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 25 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # Restore the most recent NVD cache so we only apply a small incremental update
      # instead of re-downloading the whole database every night.
      - name: Restore NVD database cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.gradle/dependency-check-data
          key: dependency-check-data-${{ github.run_id }}
          restore-keys: |
            dependency-check-data-

      # Blocking on purpose: this is the enforced scan. A failure here (real CVE or NVD
      # outage) marks the scheduled run red so it gets attention and retried.
      - name: Run OWASP Dependency-Check
        run: ./gradlew dependencyCheckAggregate
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      # Save only on success so a partially-written/corrupted H2 store from a failed run
      # is never persisted and restored by later runs (here or in the PR job).
      - name: Save NVD database cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: ~/.gradle/dependency-check-data
          key: dependency-check-data-${{ github.run_id }}

      - name: Upload SARIF to GitHub Code Scanning
        if: (success() || failure()) && hashFiles('build/reports/dependency-check-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: build/reports/dependency-check-report.sarif
          category: owasp-dependency-check

      - name: Upload HTML report as artifact
        if: (success() || failure()) && hashFiles('build/reports/dependency-check-report.html') != ''
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: build/reports/dependency-check-report.html
