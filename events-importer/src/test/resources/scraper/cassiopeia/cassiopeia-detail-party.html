<!DOCTYPE html>
<!--
  Detail page fixture for a party event.
  Tests party-specific behavior: no artist extraction (party titles are
  event names, not artist names). Includes all standard detail page fields.
-->
<html lang="de-DE">
<head><title>Super Tuesday – Cassiopeia Berlin</title></head>
<body>
<div class="content-wrapper">
    <div class="modul-section events">
        <h1 class="event-date dark event word-break-all">Super Tuesday</h1>
        <a class="faq-link-wrapper margin-bottom w-inline-block"
           href="https://cassiopeia.stager.co/shop/super/events/111639689" target="_blank">
            <div class="subheading dark long">Tickets</div>
        </a>
        <div class="text-block-wrapper events">
            <div class="date-wrapper">
                <div class="subheading invert">12</div>
                <div class="subheading invert">.</div>
                <div class="subheading invert">05</div>
                <div class="subheading invert">.</div>
                <div class="subheading invert event-mobile opposite">2026</div>
            </div>
            <div class="subheading invert event-mobile">Cassiopeia Berlin</div>
        </div>
        <div class="eventpage-image-wrapper">
            <img class="eventpage-image" src="https://cdn.example.com/super-tuesday.png"/>
            <div class="flag-wrapper">
                <div class="event-detail sold-out w-condition-invisible">
                    <div class="event-text dark">Cancelled</div>
                </div>
                <div class="event-detail sold-out w-condition-invisible">
                    <div class="event-text dark">Sold-Out</div>
                </div>
            </div>
        </div>
        <div class="text-block-wrapper events">
            <div class="subheading invert gap">Party</div>
            <div class="subheading invert event-mobile line-clamp">80s, Disco &amp; Hip Hop</div>
        </div>
        <div class="text-block-wrapper events">
            <div class="date-wrapper">
                <div class="subheading invert first">Beginn</div>
                <div class="subheading invert">23:00</div>
            </div>
            <div class="date-wrapper">
                <div class="subheading invert first event-mobile">Einlass</div>
                <div class="subheading invert event-mobile">23:00</div>
            </div>
        </div>
        <div class="paragraph-wrapper">
            <div class="paragraph events">**Super Tuesday!**</div>
            <div class="paragraph events">Super 80s // Disco Hits // Hip Hop</div>
            <div class="paragraph events">Freier Eintritt bis 23:59 Uhr</div>
        </div>
    </div>
</div>
</body>
</html>
