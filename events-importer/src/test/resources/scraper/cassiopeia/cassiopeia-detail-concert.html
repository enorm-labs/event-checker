<!DOCTYPE html>
<!--
  Detail page fixture for a headliner concert with support act.
  Tests concert-specific artist extraction: the title ("Pharmakon") is the
  headliner, confirmed by the presence of "Support: Aska" in the description.
  Without a "Support:" line, the title would not be treated as an artist
  (it could be a festival name instead).
-->
<html lang="de-DE">
<head><title>Cassiopeia Berlin – Pharmakon</title></head>
<body>
<div class="content-wrapper">
    <div class="modul-section events">
        <h1 class="event-date dark event word-break-all">Pharmakon</h1>
        <a class="faq-link-wrapper margin-bottom w-inline-block"
           href="https://cassiopeia.stager.co/shop/events/pharmakon" target="_blank">
            <div class="subheading dark long">Tickets</div>
        </a>
        <div class="text-block-wrapper events">
            <div class="date-wrapper">
                <div class="subheading invert">16</div>
                <div class="subheading invert">.</div>
                <div class="subheading invert">05</div>
                <div class="subheading invert">.</div>
                <div class="subheading invert event-mobile opposite">2026</div>
            </div>
            <div class="subheading invert event-mobile">Cassiopeia Berlin</div>
        </div>
        <div class="eventpage-image-wrapper">
            <img class="eventpage-image" src="https://cdn.example.com/pharmakon.jpg"/>
            <div class="flag-wrapper">
                <div class="event-detail sold-out w-condition-invisible">
                    <div class="event-text dark">Cancelled</div>
                </div>
                <div class="event-detail sold-out w-condition-invisible">
                    <div class="event-text dark">Sold-Out</div>
                </div>
            </div>
        </div>
        <div class="text-block-wrapper events">
            <div class="subheading invert gap">Konzert</div>
            <div class="subheading invert event-mobile line-clamp">Noise</div>
        </div>
        <div class="text-block-wrapper events">
            <div class="date-wrapper">
                <div class="subheading invert first">Beginn</div>
                <div class="subheading invert">20:00</div>
            </div>
            <div class="date-wrapper">
                <div class="subheading invert first">Einlass</div>
                <div class="subheading invert">19:00</div>
            </div>
        </div>
        <div class="paragraph-wrapper">
            <div class="paragraph events">Support: Aska</div>
            <div class="paragraph events">Margaret Chardiet is an interdisciplinary sound artist.</div>
            <div class="paragraph events">aska is the project of Kristófer Páll.</div>
            <div class="paragraph events">presented by Aufnahme + Wiedergabe</div>
        </div>
    </div>
</div>
</body>
</html>
