<!DOCTYPE html>
<!--
  Detail page fixture for a cancelled event.
  Tests cancelled status flag detection from the detail page
  (the primary data source for status flags). Also tests graceful
  handling of missing image.
-->
<html lang="de-DE">
<head><title>Cancelled Show – Cassiopeia Berlin</title></head>
<body>
<div class="content-wrapper">
    <div class="modul-section events">
        <h1 class="event-date dark event word-break-all">Cancelled Show</h1>
        <div class="text-block-wrapper events">
            <div class="date-wrapper">
                <div class="subheading invert">20</div>
                <div class="subheading invert">.</div>
                <div class="subheading invert">06</div>
                <div class="subheading invert">.</div>
                <div class="subheading invert event-mobile opposite">2026</div>
            </div>
            <div class="subheading invert event-mobile">Cassiopeia Berlin</div>
        </div>
        <div class="eventpage-image-wrapper">
            <div class="flag-wrapper">
                <div class="event-detail sold-out">
                    <div class="event-text dark">Cancelled</div>
                </div>
                <div class="event-detail sold-out w-condition-invisible">
                    <div class="event-text dark">Sold-Out</div>
                </div>
            </div>
        </div>
        <div class="text-block-wrapper events">
            <div class="subheading invert gap">Konzert</div>
            <div class="subheading invert event-mobile line-clamp">Noise</div>
        </div>
        <div class="text-block-wrapper events">
            <div class="date-wrapper">
                <div class="subheading invert first">Beginn</div>
                <div class="subheading invert">20:00</div>
            </div>
            <div class="date-wrapper">
                <div class="subheading invert first">Einlass</div>
                <div class="subheading invert">19:00</div>
            </div>
        </div>
        <div class="paragraph-wrapper">
            <div class="paragraph events">A great event at Cassiopeia.</div>
        </div>
    </div>
</div>
</body>
</html>
