<script>
    (function () {
        var style = document.createElement('style');
        style.textContent = `
    .events-txt.name,
    .events-txt.sexpos,
    .events-txt.tickets,
    .events-txt.light.perf.ev,
    .events-txt.dan.bijel,
    .events-txt.dan.ev,
    .events-txt.dan.bez.dat.ev,
    .div-block-16 {
      opacity: 0;
    }
  `;
        document.head.appendChild(style);
    })();

    document.addEventListener('DOMContentLoaded', function () {
        setTimeout(function sortNestedEvents() {
            var lists = document.querySelectorAll('.your-nested-list');
            var hasDates = Array.from(lists).some(list =>
                    list.querySelector('.div-grid-dan[data-date]')
            );
            if (!hasDates) {
                setTimeout(sortNestedEvents, 300);
                return;
            }

            lists.forEach(function (list) {
                var items = Array.from(list.children);
                items.sort((a, b) => {
                    var ga = a.querySelector('.div-grid-dan');
                    var gb = b.querySelector('.div-grid-dan');
                    return new Date(ga ? ga.getAttribute('data-date') : 0) - new Date(gb ? gb.getAttribute('data-date') : 0);
                }).forEach(item => list.appendChild(item));
            });

            setTimeout(function () {
                var selectors = [
                    '.events-txt.name',
                    '.events-txt.sexpos',
                    '.events-txt.tickets',
                    '.events-txt.light.perf.ev',
                    '.events-txt.dan.bijel',
                    '.events-txt.dan.ev',
                    '.events-txt.dan.bez.dat.ev',
                    '.div-block-16'
                ];
                selectors.forEach(function (selector) {
                    document.querySelectorAll(selector).forEach(function (el) {
                        el.style.opacity = '1';
                        if (el.querySelector('.gsap_split_letter')) return;
                        var split = new SplitText(el, {
                            type: 'chars,words',
                            charsClass: 'gsap_split_letter gsap_split_letter##',
                            wordsClass: 'gsap_split_word gsap_split_word##'
                        });
                        gsap.from(split.chars, {
                            opacity: 0,
                            duration: 0.3,
                            stagger: {amount: 0.4, from: 'random'},
                            ease: 'power2.out',
                            scrollTrigger: {
                                trigger: el,
                                start: 'top 90%',
                                end: 'bottom top',
                                toggleActions: 'play none none reset'
                            }
                        });
                    });
                });
                ScrollTrigger.refresh();
            }, 400);

        }, 800);
    });
</script>
