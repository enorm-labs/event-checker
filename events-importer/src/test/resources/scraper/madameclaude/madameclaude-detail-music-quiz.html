<!--
  Fixture mirroring a Madame Claude "Music Quiz" detail page. The event title (h2)
  is repeated as an h3 heading, which the bespoke h3->artist extraction would
  otherwise ingest as a performer. "Music Quiz" is on the NON_ARTIST_NAMES denylist,
  so no artist should be created — but the description block must still be collected.
-->
<html>
<body>
<main>
    <div class="container-info-single-event">
        <div class="primary-info-single-event">
            <div class="date">
                <p class="numbers"><font>14/09/26</font></p>
                <p class="days"><font>Music Quiz</font></p>
            </div>
            <h2>Music Quiz</h2>
            <div class="info">
                <p>Doors 19:00 / Start 20:00 / Free</p>
                <h3>Music Quiz</h3>
                <p>Grab your team and guess the songs — the winning team takes home a bottle of sekt.</p>
            </div>
        </div>
    </div>
</main>
</body>
</html>
