<!doctype html>
<html lang="">
  <head>
    <meta charset="UTF-8" />
    <link href="/favicon.svg" rel="icon" type="image/svg+xml" />
    <link href="/favicon.ico" rel="icon" sizes="32x32" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Event Junkie — Can't get enough of Berlin</title>

    <!--
      Site-level meta and social-share tags. The SPA keeps `og:title`/`twitter:title` in
      sync per view (see usePageTitle), which reaches JS-executing crawlers; non-JS
      scrapers fall back to these static values. Full per-route coverage needs SSR/prerender.
    -->
    <meta
      content="Concerts, club nights, festivals and more across Berlin venues. Find your next event with Event Junkie."
      name="description"
    />
    <meta content="website" property="og:type" />
    <meta content="Event Junkie" property="og:site_name" />
    <meta content="Event Junkie — Can't get enough of Berlin" property="og:title" />
    <meta
      content="Concerts, club nights, festivals and more across Berlin venues. Find your next event with Event Junkie."
      property="og:description"
    />
    <meta content="summary" name="twitter:card" />
    <meta content="Event Junkie — Can't get enough of Berlin" name="twitter:title" />
    <meta
      content="Concerts, club nights, festivals and more across Berlin venues. Find your next event with Event Junkie."
      name="twitter:description"
    />
    <script>
      // Apply the theme before first paint so a reload never flashes the wrong mode.
      // New visitors default to dark (nightlife brand); an explicit stored choice always wins.
      try {
        if (localStorage.getItem('theme') !== 'light') {
          document.documentElement.classList.add('dark')
        }
      } catch {
        document.documentElement.classList.add('dark')
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script src="/src/main.ts" type="module"></script>
  </body>
</html>
