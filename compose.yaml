services:
  postgres:
    image: 'postgres:18.3-alpine'
    environment:
      - 'POSTGRES_DB=event_checker'
      - 'POSTGRES_PASSWORD=admin'
      - 'POSTGRES_USER=admin'
    ports:
      # Fixed host port for convenient manual DB access (psql, IntelliJ Database panel).
      # Spring Boot Docker Compose support auto-discovers the mapped port regardless.
      # Override via environment variable if the default port conflicts:
      #   POSTGRES_HOST_PORT=5555 ./gradlew :events-importer:bootRun
      - '${POSTGRES_HOST_PORT:-56298}:5432'
